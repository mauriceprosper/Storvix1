<!-- ═══════════════════════════════════════════════════════
     STORVIX MODULE 3 — ANALYTICS TAB
     
     HOW TO INTEGRATE:
     1. Add the Chart.js script to dashboard.html <head>:
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
     
     2. Add this nav item to the sidebar nav in dashboard.html
        (after the Products nav item):
        <button class="nav-item" onclick="showTab('analytics', this)">
          <span class="icon">📈</span> Analytics
        </button>
     
     3. Add the tab titles map entry in showTab():
        analytics: 'Analytics'
     
     4. Paste the HTML below into dashboard.html content div
        (alongside the other tab-content divs)
     
     5. Paste the JS at the bottom of the module script
     ═══════════════════════════════════════════════════════ -->


<!-- ── ANALYTICS TAB HTML ─────────────────────────────── -->
<div class="tab-content" id="tab-analytics">

  <!-- Period selector -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
    <div>
      <h2 style="font-family:'Instrument Serif',serif;font-size:22px;font-weight:700">Store Analytics</h2>
      <p style="font-size:13px;color:var(--muted);margin-top:3px">Track your revenue, orders, and product performance</p>
    </div>
    <div style="display:flex;gap:8px" id="periodBtns">
      <button class="period-btn active" onclick="setPeriod(7,this)">7 days</button>
      <button class="period-btn" onclick="setPeriod(30,this)">30 days</button>
      <button class="period-btn" onclick="setPeriod(90,this)">90 days</button>
    </div>
  </div>

  <!-- KPI cards -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px" id="analyticsKpis">
    <div class="kpi-card">
      <div class="kpi-label">Revenue</div>
      <div class="kpi-value" id="aRevenue">₦0</div>
      <div class="kpi-delta" id="aRevenueDelta"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Orders</div>
      <div class="kpi-value" id="aOrders">0</div>
      <div class="kpi-delta" id="aOrdersDelta"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Avg Order Value</div>
      <div class="kpi-value" id="aAov">₦0</div>
      <div class="kpi-delta" id="aAovDelta"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Conversion</div>
      <div class="kpi-value" id="aConv">—</div>
      <div class="kpi-delta" style="color:var(--muted)">Store views tracked</div>
    </div>
  </div>

  <!-- Revenue chart -->
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px">
    <div class="analytics-card">
      <div class="ac-head">
        <div class="ac-title">Revenue Over Time</div>
        <div class="ac-sub" id="revChartSub"></div>
      </div>
      <div style="position:relative;height:220px">
        <canvas id="revenueChart"></canvas>
      </div>
    </div>
    <div class="analytics-card">
      <div class="ac-head">
        <div class="ac-title">Orders by Status</div>
      </div>
      <div style="position:relative;height:220px;display:flex;align-items:center;justify-content:center">
        <canvas id="statusChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Top products + Recent activity -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <div class="analytics-card">
      <div class="ac-head"><div class="ac-title">Top Products</div></div>
      <div id="topProductsList" style="display:flex;flex-direction:column;gap:10px;margin-top:4px"></div>
    </div>
    <div class="analytics-card">
      <div class="ac-head"><div class="ac-title">Recent Activity</div></div>
      <div id="activityFeed" style="display:flex;flex-direction:column;gap:8px;margin-top:4px"></div>
    </div>
  </div>

</div>


<!-- ── ANALYTICS CSS (add to dashboard.html <style> block) ── -->
<style>
.period-btn {
  padding: 7px 16px; border-radius: 99px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1.5px solid var(--border); background: transparent;
  color: var(--muted); transition: all 0.2s; font-family: 'DM Sans', sans-serif;
}
.period-btn:hover { border-color: var(--blue); color: var(--blue); }
.period-btn.active { background: var(--ink); border-color: var(--ink); color: #fff; }

.kpi-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; transition: box-shadow 0.2s;
}
.kpi-card:hover { box-shadow: 0 4px 16px rgba(14,14,14,0.08); }
.kpi-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.kpi-value { font-size: 28px; font-weight: 700; color: var(--ink); line-height: 1; margin-bottom: 6px; }
.kpi-delta { font-size: 12px; font-weight: 600; }
.kpi-delta.up { color: var(--success); }
.kpi-delta.down { color: var(--danger); }

.analytics-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px;
}
.ac-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.ac-title { font-size: 15px; font-weight: 700; color: var(--ink); }
.ac-sub { font-size: 12px; color: var(--muted); }

.top-product-row {
  display: flex; align-items: center; gap: 12px; padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.top-product-row:last-child { border-bottom: none; }
.tp-rank { width: 24px; height: 24px; border-radius: 50%; background: var(--blue-light); color: var(--blue); font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tp-rank.gold { background: #fef9c3; color: #a16207; }
.tp-name { font-size: 14px; font-weight: 600; flex: 1; }
.tp-meta { font-size: 12px; color: var(--muted); margin-top: 1px; }
.tp-revenue { font-size: 14px; font-weight: 700; text-align: right; }
.tp-units { font-size: 11px; color: var(--muted); text-align: right; margin-top: 1px; }

.activity-item {
  display: flex; align-items: flex-start; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid var(--border); font-size: 13px;
}
.activity-item:last-child { border-bottom: none; }
.activity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.activity-dot.order { background: var(--blue); }
.activity-dot.stock { background: var(--warn, #d97706); }
.activity-dot.payout { background: var(--success); }
.activity-text { flex: 1; line-height: 1.4; }
.activity-time { font-size: 11px; color: var(--muted); white-space: nowrap; }

@media(max-width:900px) {
  #analyticsKpis { grid-template-columns: 1fr 1fr; }
  #analyticsKpis + div, #analyticsKpis + div + div { grid-template-columns: 1fr; }
}
</style>


<!-- ── ANALYTICS JS (paste inside the module script in dashboard.html) ── -->
<script type="text/analytics-module">

// ── Analytics state ─────────────────────────────────────
let analyticsChart  = null;
let statusChart     = null;
let analyticsPeriod = 7;

window.setPeriod = function(days, el) {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  analyticsPeriod = days;
  loadAnalytics();
};

async function loadAnalytics() {
  if (!seller) return;

  // Fetch all orders once — filter client-side by period
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - analyticsPeriod);
  const prevCutoff = new Date();
  prevCutoff.setDate(prevCutoff.getDate() - analyticsPeriod * 2);

  const orders = allOrders; // already loaded via real-time listener

  const current  = orders.filter(o => o.createdAt?.toDate && o.createdAt.toDate() >= cutoff && o.status !== 'cancelled');
  const previous = orders.filter(o => o.createdAt?.toDate && o.createdAt.toDate() >= prevCutoff && o.createdAt.toDate() < cutoff && o.status !== 'cancelled');

  const rev     = current.reduce((s, o)  => s + (o.total || 0), 0);
  const prevRev = previous.reduce((s, o) => s + (o.total || 0), 0);
  const aov     = current.length ? rev / current.length : 0;
  const prevAov = previous.length ? prevRev / previous.length : 0;

  // KPI cards
  document.getElementById('aRevenue').textContent = fmt(rev);
  document.getElementById('aOrders').textContent  = current.length;
  document.getElementById('aAov').textContent     = fmt(aov);

  setDelta('aRevenueDelta', rev, prevRev);
  setDelta('aOrdersDelta', current.length, previous.length, true);
  setDelta('aAovDelta', aov, prevAov);

  // Revenue chart
  buildRevenueChart(current, analyticsPeriod);

  // Status doughnut
  buildStatusChart(orders);

  // Top products
  buildTopProducts(current);

  // Activity feed
  buildActivityFeed(orders.slice(0, 10));
}

function setDelta(elId, current, previous, isCount = false) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (!previous) { el.textContent = 'No previous data'; el.className = 'kpi-delta'; return; }
  const pct = ((current - previous) / previous * 100).toFixed(1);
  const up  = current >= previous;
  el.textContent  = `${up ? '↑' : '↓'} ${Math.abs(pct)}% vs prev period`;
  el.className    = `kpi-delta ${up ? 'up' : 'down'}`;
}

function buildRevenueChart(orders, days) {
  const labels = [];
  const data   = [];

  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const label = d.toLocaleDateString('en-NG', { month: 'short', day: 'numeric' });
    labels.push(label);
    const dayRevenue = orders
      .filter(o => {
        if (!o.createdAt?.toDate) return false;
        const od = o.createdAt.toDate();
        return od.toDateString() === d.toDateString();
      })
      .reduce((s, o) => s + (o.total || 0), 0);
    data.push(dayRevenue);
  }

  document.getElementById('revChartSub').textContent =
    `Last ${days} days · ${fmt(data.reduce((a,b)=>a+b,0))} total`;

  const ctx = document.getElementById('revenueChart').getContext('2d');
  if (analyticsChart) analyticsChart.destroy();
  analyticsChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Revenue',
        data,
        fill: true,
        borderColor: '#1B6EF5',
        backgroundColor: 'rgba(27,110,245,0.08)',
        tension: 0.4,
        pointBackgroundColor: '#1B6EF5',
        pointRadius: days <= 14 ? 4 : 2,
        borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => '  ' + fmt(ctx.raw) }
      }},
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 }, maxTicksLimit: 8 } },
        y: { grid: { color: '#f0ede8' }, ticks: {
          font: { size: 11 },
          callback: v => v >= 1000 ? '₦' + (v/1000).toFixed(0) + 'k' : '₦' + v
        }}
      }
    }
  });
}

function buildStatusChart(orders) {
  const counts = {
    Confirmed:  orders.filter(o => o.status === 'confirmed').length,
    Shipped:    orders.filter(o => o.status === 'shipped').length,
    Delivered:  orders.filter(o => o.status === 'delivered').length,
    Cancelled:  orders.filter(o => o.status === 'cancelled').length,
    Pending:    orders.filter(o => o.status === 'pending').length,
  };
  const filtered = Object.entries(counts).filter(([,v]) => v > 0);

  const ctx = document.getElementById('statusChart').getContext('2d');
  if (statusChart) statusChart.destroy();

  if (!filtered.length) {
    ctx.canvas.parentElement.innerHTML = `<p style="color:var(--muted);font-size:14px;text-align:center">No orders yet</p>`;
    return;
  }

  statusChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: filtered.map(([k]) => k),
      datasets: [{
        data: filtered.map(([,v]) => v),
        backgroundColor: ['#1B6EF5','#0ba4db','#16a34a','#dc2626','#d97706'],
        borderWidth: 0,
        hoverOffset: 6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 12 }, padding: 12 } }
      }
    }
  });
}

function buildTopProducts(orders) {
  const productMap = {};
  orders.forEach(o => {
    (o.items || []).forEach(item => {
      const key = item.name;
      if (!productMap[key]) productMap[key] = { name: key, units: 0, revenue: 0 };
      productMap[key].units   += item.qty || 1;
      productMap[key].revenue += (item.price || 0) * (item.qty || 1);
    });
  });

  const top5 = Object.values(productMap)
    .sort((a, b) => b.revenue - a.revenue)
    .slice(0, 5);

  const el = document.getElementById('topProductsList');
  if (!top5.length) {
    el.innerHTML = `<p style="color:var(--muted);font-size:14px;text-align:center;padding:20px 0">No sales yet in this period</p>`;
    return;
  }

  el.innerHTML = top5.map((p, i) => `
    <div class="top-product-row">
      <div class="tp-rank ${i === 0 ? 'gold' : ''}">${i + 1}</div>
      <div style="flex:1">
        <div class="tp-name">${p.name}</div>
        <div class="tp-meta">${p.units} unit${p.units !== 1 ? 's' : ''} sold</div>
      </div>
      <div>
        <div class="tp-revenue">${fmt(p.revenue)}</div>
      </div>
    </div>`).join('');
}

function buildActivityFeed(orders) {
  const el = document.getElementById('activityFeed');
  if (!orders.length) {
    el.innerHTML = `<p style="color:var(--muted);font-size:14px;text-align:center;padding:20px 0">No activity yet</p>`;
    return;
  }

  el.innerHTML = orders.slice(0, 8).map(o => {
    const date = o.createdAt?.toDate ? timeAgo(o.createdAt.toDate()) : '';
    const icon = o.status === 'cancelled' ? 'stock' : o.status === 'delivered' ? 'payout' : 'order';
    const text = o.status === 'cancelled'
      ? `Order ${o.orderNumber} was cancelled`
      : o.status === 'delivered'
      ? `${o.buyer?.name || 'Customer'} received order ${o.orderNumber}`
      : `New order from ${o.buyer?.name || 'Customer'} — ${fmt(o.total)}`;
    return `
      <div class="activity-item">
        <div class="activity-dot ${icon}"></div>
        <div class="activity-text">${text}</div>
        <div class="activity-time">${date}</div>
      </div>`;
  }).join('');
}

function timeAgo(date) {
  const diff = Math.floor((Date.now() - date) / 1000);
  if (diff < 60)    return 'just now';
  if (diff < 3600)  return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

// Call loadAnalytics when tab is shown
const _origShowTab = window.showTab;
window.showTab = function(tab, el) {
  _origShowTab(tab, el);
  if (tab === 'analytics') loadAnalytics();
};

</script>
