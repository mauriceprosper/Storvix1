<!-- PATCH: Replace the verifyAccount function in onboarding.html -->
<!-- This is the updated script block — replace the full <script type="module"> section -->

<!-- In onboarding.html, replace window.verifyAccount with this: -->
<script type="module">
  // ADD this import at the top of the existing module script:
  import { getFunctions, httpsCallable }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-functions.js";

  // Then replace window.verifyAccount with:
  window.verifyAccount = async function() {
    const bankCode = document.getElementById('bankSelect').value;
    const acct     = document.getElementById('accountNumber').value;
    if (!bankCode) { toast('Please select a bank', 'error'); return; }
    if (acct.length !== 10) { toast('Account number must be 10 digits', 'error'); return; }

    const btn = document.querySelector('.verify-btn');
    btn.textContent = 'Verifying…'; btn.disabled = true;

    try {
      const app = initializeApp(firebaseConfig, 'onboard-verify');
      const functions = getFunctions(app, 'europe-west1');
      const verifyFn = httpsCallable(functions, 'verifyBankAccount');
      const result = await verifyFn({ accountNumber: acct, bankCode });

      const name = result.data.accountName;
      document.getElementById('accountHolder').value = name;
      document.getElementById('accountName').textContent = `✓ ${name}`;
      document.getElementById('accountName').className = 'account-name show';
      accountVerified = true;
      toast('Account verified!', 'success');
    } catch (err) {
      toast(err.message || 'Verification failed. Check your account details.', 'error');
    } finally {
      btn.textContent = 'Verify →'; btn.disabled = false;
    }
  };
</script>
